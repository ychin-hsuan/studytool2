<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PDF 智慧解題工具</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #22263a;
      --border: #2e3250;
      --accent: #6c63ff;
      --accent2: #a78bfa;
      --text: #e2e8f0;
      --muted: #8892b0;
      --success: #4ade80;
      --error: #f87171;
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
    }

    header {
      text-align: center;
      margin-bottom: 2.5rem;
      position: relative;
      width: 100%;
      max-width: 800px;
    }

    header h1 {
      font-size: 2rem;
      font-weight: 700;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    header p {
      color: var(--muted);
      margin-top: 0.5rem;
      font-size: 0.95rem;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 2rem;
      width: 100%;
      max-width: 800px;
      margin-bottom: 1.5rem;
    }

    /* Drop zone */
    #drop-zone {
      border: 2px dashed var(--border);
      border-radius: 12px;
      padding: 3rem 2rem;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      position: relative;
    }

    #drop-zone:hover, #drop-zone.drag-over {
      border-color: var(--accent);
      background: rgba(108, 99, 255, 0.06);
    }

    #drop-zone svg {
      width: 48px;
      height: 48px;
      color: var(--accent);
      margin-bottom: 1rem;
    }

    #drop-zone p { color: var(--muted); font-size: 0.9rem; margin-top: 0.4rem; }
    #drop-zone strong { color: var(--text); font-size: 1rem; }

    #file-input { display: none; }

    /* File info */
    #file-info {
      display: none;
      align-items: center;
      gap: 1rem;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1rem 1.25rem;
      margin-top: 1rem;
    }

    #file-info svg { color: var(--accent2); flex-shrink: 0; }
    #file-name { font-size: 0.9rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    #file-size { font-size: 0.8rem; color: var(--muted); }

    /* Button */
    #solve-btn {
      display: block;
      width: 100%;
      margin-top: 1.5rem;
      padding: 0.85rem;
      border: none;
      border-radius: 10px;
      background: linear-gradient(135deg, var(--accent), #8b5cf6);
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }

    #solve-btn:hover:not(:disabled) { opacity: 0.9; transform: translateY(-1px); }
    #solve-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    /* Progress */
    #progress-bar-wrap {
      display: none;
      margin-top: 1rem;
      height: 4px;
      background: var(--border);
      border-radius: 4px;
      overflow: hidden;
    }

    #progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      border-radius: 4px;
      transition: width 0.3s;
      animation: pulse-bar 1.5s ease-in-out infinite alternate;
    }

    @keyframes pulse-bar {
      from { opacity: 1; }
      to { opacity: 0.6; }
    }

    /* Status */
    #status {
      display: none;
      font-size: 0.85rem;
      margin-top: 0.75rem;
      color: var(--muted);
      text-align: center;
    }

    /* Answer section */
    #answer-section {
      display: none;
      width: 100%;
      max-width: 800px;
    }

    #answer-section h2 {
      font-size: 1.1rem;
      font-weight: 600;
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    #answer-section h2 .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--success);
      animation: blink 1s step-start infinite;
    }

    @keyframes blink { 50% { opacity: 0; } }
    .dot.done { animation: none !important; background: var(--accent2); }

    #answer-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.5rem;
      white-space: pre-wrap;
      line-height: 1.8;
      font-size: 0.93rem;
      min-height: 200px;
      max-height: 70vh;
      overflow-y: auto;
      word-break: break-word;
    }

    #answer-box::-webkit-scrollbar { width: 6px; }
    #answer-box::-webkit-scrollbar-track { background: transparent; }
    #answer-box::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* Question blocks (rendered after streaming completes) */
    .q-block {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1.25rem 1.5rem;
      margin-bottom: 1rem;
    }
    .q-block:last-child { margin-bottom: 0; }

    .qb-header {
      color: var(--accent2);
      font-weight: 700;
      font-size: 0.95rem;
      margin-bottom: 0.6rem;
    }

    .qb-content {
      white-space: pre-wrap;
      line-height: 1.8;
      font-size: 0.93rem;
      word-break: break-word;
    }

    .qb-followup-wrap {
      margin-top: 1rem;
      padding-top: 0.75rem;
      border-top: 1px solid var(--border);
    }

    .followup-toggle-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--muted);
      font-size: 0.82rem;
      padding: 0.35rem 0.75rem;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }
    .followup-toggle-btn:hover { border-color: var(--accent2); color: var(--accent2); }
    .followup-toggle-btn.open { border-color: var(--accent2); color: var(--accent2); }

    .followup-panel { margin-top: 0.75rem; }

    .followup-quick {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-bottom: 0.75rem;
    }

    .followup-quick button {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--muted);
      font-size: 0.8rem;
      padding: 0.3rem 0.65rem;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }
    .followup-quick button:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }
    .followup-quick button:disabled { opacity: 0.4; cursor: not-allowed; }

    .followup-input-row {
      display: flex;
      gap: 0.5rem;
      align-items: flex-end;
    }

    .followup-input {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 0.88rem;
      padding: 0.55rem 0.85rem;
      resize: none;
      font-family: inherit;
      transition: border-color 0.2s;
    }
    .followup-input:focus { outline: none; border-color: var(--accent2); }

    .followup-send-btn {
      background: var(--accent);
      border: none;
      border-radius: 8px;
      color: #fff;
      font-size: 0.85rem;
      padding: 0.55rem 1rem;
      cursor: pointer;
      transition: opacity 0.2s;
      white-space: nowrap;
    }
    .followup-send-btn:hover:not(:disabled) { opacity: 0.85; }
    .followup-send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .followup-history {
      margin-top: 0.75rem;
      display: flex;
      flex-direction: column;
      gap: 0.65rem;
    }

    .followup-exchange {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.75rem 1rem;
      font-size: 0.88rem;
      line-height: 1.7;
    }

    .followup-exchange .fq {
      color: var(--accent2);
      font-weight: 600;
      font-size: 0.78rem;
      margin-bottom: 0.3rem;
    }

    .followup-exchange .fa {
      white-space: pre-wrap;
      word-break: break-word;
    }

    .followup-exchange .fa.streaming::after {
      content: '▌';
      animation: blink 0.8s step-start infinite;
    }

    /* Error */
    .error-msg {
      color: var(--error);
      background: rgba(248, 113, 113, 0.1);
      border: 1px solid rgba(248, 113, 113, 0.3);
      border-radius: 8px;
      padding: 0.75rem 1rem;
      font-size: 0.875rem;
      margin-top: 0.75rem;
      display: none;
    }

    /* Settings button in header */
    #settings-btn {
      position: absolute;
      top: 0; right: 0;
      display: flex;
      align-items: center;
      gap: 0.4rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--muted);
      font-size: 0.82rem;
      padding: 0.4rem 0.75rem;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }
    #settings-btn:hover { border-color: var(--accent2); color: var(--accent2); }

    .key-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--error);
      flex-shrink: 0;
    }
    .key-dot.set { background: var(--success); }

    /* Settings modal overlay */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }

    .settings-modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.75rem;
      width: min(420px, 90vw);
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.25rem;
    }
    .modal-header h3 { font-size: 1rem; font-weight: 600; }
    .modal-close-btn {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 1.1rem;
      cursor: pointer;
      line-height: 1;
    }
    .modal-close-btn:hover { color: var(--text); }

    .modal-label {
      font-size: 0.82rem;
      color: var(--muted);
      margin-bottom: 0.4rem;
    }

    .key-input-row {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 0.75rem;
    }

    .key-input {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 0.88rem;
      padding: 0.55rem 0.85rem;
      font-family: monospace;
      transition: border-color 0.2s;
    }
    .key-input:focus { outline: none; border-color: var(--accent2); }

    .modal-btn-row { display: flex; gap: 0.5rem; margin-bottom: 1rem; }

    .btn-save {
      flex: 1;
      padding: 0.55rem;
      background: var(--accent);
      border: none;
      border-radius: 8px;
      color: #fff;
      font-size: 0.88rem;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .btn-save:hover { opacity: 0.85; }

    .btn-clear {
      padding: 0.55rem 0.9rem;
      background: none;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--muted);
      font-size: 0.88rem;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }
    .btn-clear:hover { border-color: var(--error); color: var(--error); }

    .modal-note {
      font-size: 0.78rem;
      color: var(--muted);
      line-height: 1.6;
    }

    /* Action buttons (copy / export / print) */
    .action-row {
      display: none;
      gap: 0.5rem;
      margin-top: 1rem;
      flex-wrap: wrap;
    }

    .action-row button {
      padding: 0.55rem 1rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface2);
      color: var(--text);
      font-size: 0.85rem;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
    }
    .action-row button:hover { background: var(--border); }
    .action-row button.copied { color: var(--success); border-color: var(--success); }

    footer {
      margin-top: 3rem;
      color: var(--muted);
      font-size: 0.78rem;
      text-align: center;
    }

    /* ── Print styles ── */
    @media print {
      body { background: #fff; color: #000; padding: 0; }
      header, .card, #answer-section > h2, footer,
      .qb-followup-wrap, .action-row { display: none !important; }
      #answer-section {
        display: block !important;
        width: 100%;
        max-width: 100%;
      }
      #answer-box {
        max-height: none;
        overflow: visible;
        border: none;
        padding: 0;
        background: transparent;
      }
      .q-block {
        background: transparent;
        border: 1px solid #ccc;
        break-inside: avoid;
        margin-bottom: 1rem;
      }
      .qb-header { color: #4b0082; }
    }
  </style>
</head>
<body>

<header>
  <h1>PDF 智慧解題工具</h1>
  <p>上傳含有題目的 PDF，AI 即時為您解答每一道題</p>
  <button id="settings-btn" title="API Key 設定">
    <span id="key-dot" class="key-dot"></span>
    ⚙ 設定
  </button>
</header>

<!-- Settings modal -->
<div id="settings-overlay" class="overlay" style="display:none">
  <div class="settings-modal">
    <div class="modal-header">
      <h3>⚙ API Key 設定</h3>
      <button class="modal-close-btn" id="modal-close">✕</button>
    </div>
    <p class="modal-label">Anthropic API Key</p>
    <div class="key-input-row">
      <input type="password" id="api-key-input" class="key-input"
             placeholder="sk-ant-api03-…" autocomplete="off" spellcheck="false" />
    </div>
    <div class="modal-btn-row">
      <button class="btn-save" id="save-key-btn">儲存</button>
      <button class="btn-clear" id="clear-key-btn">清除</button>
    </div>
    <p class="modal-note">
      金鑰僅存於此瀏覽器的 sessionStorage（關閉分頁即清除），每次請求以 Header 傳送至本地伺服器，不會傳到其他地方。<br>
      若伺服器已設定 <code>ANTHROPIC_API_KEY</code> 環境變數，此欄可留空。
    </p>
  </div>
</div>

<div class="card">
  <div id="drop-zone" role="button" tabindex="0" aria-label="點擊或拖曳上傳 PDF">
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
        d="M9 13h6m-3-3v6m-9 1V7a2 2 0 012-2h6l2 2h6a2 2 0 012 2v8a2 2 0 01-2 2H5a2 2 0 01-2-2z"/>
    </svg>
    <strong>點擊上傳或將 PDF 拖曳至此</strong>
    <p>支援最大 20MB 的 PDF 考卷檔案</p>
    <input type="file" id="file-input" accept=".pdf" />
  </div>

  <div id="file-info">
    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
        d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v14a2 2 0 002 2z"/>
    </svg>
    <div>
      <div id="file-name"></div>
      <div id="file-size"></div>
    </div>
  </div>

  <div id="error-msg" class="error-msg"></div>

  <button id="solve-btn" disabled>上傳並解題</button>

  <div id="progress-bar-wrap">
    <div id="progress-bar"></div>
  </div>
  <div id="status"></div>
</div>

<div id="answer-section">
  <h2>
    <span id="live-dot" class="dot"></span>
    AI 解題結果
  </h2>
  <div id="answer-box"></div>
  <div class="action-row" id="action-row">
    <button id="copy-btn">複製</button>
    <button id="export-md-btn">⬇ 下載 Markdown</button>
    <button id="print-btn">🖨 列印 / 存 PDF</button>
  </div>
</div>

<footer>Powered by Claude AI &amp; FastAPI</footer>

<script>
  const dropZone = document.getElementById('drop-zone');
  const fileInput = document.getElementById('file-input');
  const fileInfo = document.getElementById('file-info');
  const fileName = document.getElementById('file-name');
  const fileSize = document.getElementById('file-size');
  const solveBtn = document.getElementById('solve-btn');
  const errorMsg = document.getElementById('error-msg');
  const progressWrap = document.getElementById('progress-bar-wrap');
  const progressBar = document.getElementById('progress-bar');
  const statusEl    = document.getElementById('status');
  const answerSection = document.getElementById('answer-section');
  const answerBox   = document.getElementById('answer-box');
  const actionRow   = document.getElementById('action-row');
  const copyBtn     = document.getElementById('copy-btn');
  const exportMdBtn = document.getElementById('export-md-btn');
  const printBtn    = document.getElementById('print-btn');
  const liveDot     = document.getElementById('live-dot');

  // ── API Key state ─────────────────────────────────────────────
  let apiKey = sessionStorage.getItem('anthropic_api_key') || '';

  function updateKeyDot() {
    const dot = document.getElementById('key-dot');
    dot.className = 'key-dot' + (apiKey ? ' set' : '');
    document.getElementById('settings-btn').title =
      apiKey ? 'API Key 已設定 ✓' : 'API Key 未設定';
  }
  updateKeyDot();

  function apiHeaders() {
    return { 'Content-Type': 'application/json', 'X-API-Key': apiKey };
  }

  // Settings modal
  const overlay   = document.getElementById('settings-overlay');
  const keyInput  = document.getElementById('api-key-input');

  document.getElementById('settings-btn').addEventListener('click', () => {
    keyInput.value = '';   // never repopulate — mask instead
    keyInput.placeholder = apiKey ? `已設定（…${apiKey.slice(-4)}）` : 'sk-ant-api03-…';
    overlay.style.display = 'flex';
    setTimeout(() => keyInput.focus(), 50);
  });

  function closeModal() { overlay.style.display = 'none'; }
  document.getElementById('modal-close').addEventListener('click', closeModal);
  overlay.addEventListener('click', e => { if (e.target === overlay) closeModal(); });

  document.getElementById('save-key-btn').addEventListener('click', () => {
    const newKey = keyInput.value.trim();
    if (newKey) {   // only overwrite if user typed a new key
      apiKey = newKey;
      sessionStorage.setItem('anthropic_api_key', apiKey);
    }
    updateKeyDot();
    closeModal();
  });

  document.getElementById('clear-key-btn').addEventListener('click', () => {
    apiKey = '';
    sessionStorage.removeItem('anthropic_api_key');
    keyInput.value = '';
    updateKeyDot();
  });

  keyInput.addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('save-key-btn').click(); });

  // ── App state ─────────────────────────────────────────────────
  let selectedFile = null;
  let extractedText = '';
  let extractedImages = [];
  let abortController = null;

  function formatBytes(bytes) {
    if (bytes < 1024) return bytes + ' B';
    if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
    return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
  }

  function showError(msg) {
    errorMsg.textContent = msg;
    errorMsg.style.display = 'block';
  }

  function clearError() {
    errorMsg.style.display = 'none';
    errorMsg.textContent = '';
  }

  function setStatus(msg) {
    statusEl.style.display = msg ? 'block' : 'none';
    statusEl.textContent = msg;
  }

  function setFile(file) {
    if (!file) return;
    if (!file.name.toLowerCase().endsWith('.pdf')) {
      showError('請選擇 PDF 檔案');
      return;
    }
    if (file.size > 20 * 1024 * 1024) {
      showError('檔案大小不能超過 20MB');
      return;
    }
    clearError();
    selectedFile = file;
    fileName.textContent = file.name;
    fileSize.textContent = formatBytes(file.size);
    fileInfo.style.display = 'flex';
    solveBtn.disabled = false;
    solveBtn.textContent = '上傳並解題';
    extractedText = '';
    extractedImages = [];
    answerSection.style.display = 'none';
    copyBtn.style.display = 'none';
  }

  // Click to open file picker
  dropZone.addEventListener('click', () => fileInput.click());
  dropZone.addEventListener('keydown', (e) => { if (e.key === 'Enter' || e.key === ' ') fileInput.click(); });
  fileInput.addEventListener('change', () => { if (fileInput.files[0]) setFile(fileInput.files[0]); });

  // Drag & drop
  dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('drag-over'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
  dropZone.addEventListener('drop', (e) => {
    e.preventDefault();
    dropZone.classList.remove('drag-over');
    const file = e.dataTransfer.files[0];
    if (file) setFile(file);
  });

  // Main flow
  solveBtn.addEventListener('click', async () => {
    if (!selectedFile) return;
    clearError();

    // Already have extracted data — skip upload
    if (extractedText || extractedImages.length > 0) {
      startSolving(extractedText, extractedImages);
      return;
    }

    solveBtn.disabled = true;
    solveBtn.textContent = '正在解析 PDF...';
    progressWrap.style.display = 'block';
    progressBar.style.width = '30%';
    setStatus('上傳並提取 PDF 內容中...');

    const formData = new FormData();
    formData.append('file', selectedFile);

    try {
      const res = await fetch('/upload', { method: 'POST', body: formData });
      const data = await res.json();

      if (!res.ok) throw new Error(data.detail || '上傳失敗');

      progressBar.style.width = '60%';

      if (data.mode === 'ocr') {
        extractedImages = data.images;
        extractedText = '';
        setStatus(`偵測到掃描 PDF（${data.pages} 頁），切換 AI 視覺辨識模式...`);
      } else {
        extractedText = data.text;
        extractedImages = [];
      }

      startSolving(extractedText, extractedImages);

    } catch (err) {
      showError(err.message || '發生未知錯誤');
      solveBtn.disabled = false;
      solveBtn.textContent = '上傳並解題';
      progressWrap.style.display = 'none';
      setStatus('');
    }
  });

  async function startSolving(text, images = []) {
    if (abortController) { abortController.abort(); abortController = null; }
    abortController = new AbortController();

    const isOcr = images.length > 0;
    solveBtn.disabled = true;
    solveBtn.textContent = '解題中...';
    progressBar.style.width = '80%';
    setStatus(isOcr
      ? `AI 正在辨識手寫內容並解題，共 ${images.length} 頁（可能需要較長時間）...`
      : 'AI 正在分析題目並生成解答...');

    answerSection.style.display = 'block';
    answerBox.textContent = '';
    copyBtn.style.display = 'none';
    liveDot.classList.remove('done');

    try {
      const res = await fetch('/solve', {
        method: 'POST',
        headers: apiHeaders(),
        body: JSON.stringify({ text, images }),
        signal: abortController.signal,
      });

      if (!res.ok) {
        const err = await res.json();
        throw new Error(err.detail || '解題請求失敗');
      }

      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, { stream: true });

        const lines = buffer.split('\n');
        buffer = lines.pop(); // keep incomplete line

        for (const line of lines) {
          if (!line.startsWith('data: ')) continue;
          let payload;
          try { payload = JSON.parse(line.slice(6)); } catch { continue; }

          if (payload.error) {
            showError(payload.error);
            finishSolving(true);
            return;
          }
          if (payload.done) {
            finishSolving(false);
            return;
          }
          if (payload.text) {
            answerBox.textContent += payload.text;
            answerBox.scrollTop = answerBox.scrollHeight;
          }
        }
      }
      finishSolving(false);

    } catch (err) {
      if (err.name === 'AbortError') return;
      showError(err.message || '串流連線中斷，請重試');
      finishSolving(true);
    }
  }

  function finishSolving(isError) {
    abortController = null;
    progressBar.style.width = '100%';
    setTimeout(() => { progressWrap.style.display = 'none'; progressBar.style.width = '0%'; }, 600);
    setStatus('');
    liveDot.classList.add('done');
    solveBtn.disabled = false;
    solveBtn.textContent = '重新解題';

    if (!isError && answerBox.textContent.trim()) {
      renderBlocks(answerBox.textContent);
      actionRow.style.display = 'flex';
    }
  }

  // ── Export / print actions ────────────────────────────────────

  copyBtn.addEventListener('click', () => {
    navigator.clipboard.writeText(answerBox.textContent).then(() => {
      copyBtn.textContent = '已複製 ✓';
      copyBtn.classList.add('copied');
      setTimeout(() => { copyBtn.textContent = '複製'; copyBtn.classList.remove('copied'); }, 2000);
    });
  });

  exportMdBtn.addEventListener('click', () => {
    const md = answerBox.textContent;
    const blob = new Blob([md], { type: 'text/markdown;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'quiz-answers.md';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  });

  printBtn.addEventListener('click', () => window.print());

  // ── Helpers ──────────────────────────────────────────────────

  function escHtml(str) {
    return str
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  // ── Block rendering ──────────────────────────────────────────

  function renderBlocks(fullText) {
    // Split on 【...】 markers, keeping markers as separate segments
    const segments = fullText.split(/(【[^】]+】)/);
    // segments: [preamble, header1, content1, header2, content2, ...]
    answerBox.innerHTML = '';

    // Preamble before first header
    if (segments[0].trim()) {
      const pre = document.createElement('div');
      pre.className = 'q-block';
      pre.innerHTML = `<div class="qb-content">${escHtml(segments[0].trim())}</div>`;
      answerBox.appendChild(pre);
    }

    for (let i = 1; i < segments.length; i += 2) {
      const header  = segments[i];
      const content = (segments[i + 1] || '').trim();
      answerBox.appendChild(createBlock(header, content));
    }
  }

  function createBlock(header, content) {
    const div = document.createElement('div');
    div.className = 'q-block';

    div.innerHTML = `
      <div class="qb-header">${escHtml(header)}</div>
      <div class="qb-content">${escHtml(content)}</div>
      <div class="qb-followup-wrap">
        <button class="followup-toggle-btn">💬 追問這題</button>
        <div class="followup-panel" style="display:none">
          <div class="followup-quick">
            <button data-q="請用更簡單易懂的方式重新解釋這題">🔄 重新解釋</button>
            <button data-q="請舉一個具體的實際例子來說明">📌 舉個例子</button>
            <button data-q="這題最重要的觀念是什麼？請條列式整理">📝 整理重點</button>
          </div>
          <div class="followup-input-row">
            <textarea class="followup-input" placeholder="輸入你想問的問題…" rows="2"></textarea>
            <button class="followup-send-btn">送出</button>
          </div>
          <div class="followup-history"></div>
        </div>
      </div>`;

    const context    = header + '\n' + content;
    const toggleBtn  = div.querySelector('.followup-toggle-btn');
    const panel      = div.querySelector('.followup-panel');
    const textarea   = div.querySelector('.followup-input');
    const sendBtn    = div.querySelector('.followup-send-btn');
    const historyEl  = div.querySelector('.followup-history');

    // Toggle panel
    toggleBtn.addEventListener('click', () => {
      const open = panel.style.display !== 'none';
      panel.style.display = open ? 'none' : 'block';
      toggleBtn.textContent = open ? '💬 追問這題' : '✕ 關閉追問';
      toggleBtn.classList.toggle('open', !open);
    });

    // Quick-action buttons
    div.querySelectorAll('.followup-quick button').forEach(btn => {
      btn.addEventListener('click', () => sendFollowup(context, btn.dataset.q, historyEl, div));
    });

    // Custom send
    const doSend = () => {
      const q = textarea.value.trim();
      if (q) { textarea.value = ''; sendFollowup(context, q, historyEl, div); }
    };
    sendBtn.addEventListener('click', doSend);
    textarea.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); doSend(); }
    });

    return div;
  }

  // ── Follow-up streaming ──────────────────────────────────────

  async function sendFollowup(context, question, historyEl, blockDiv) {
    // Lock all interactive controls in this block
    const btns = blockDiv.querySelectorAll('button');
    btns.forEach(b => b.disabled = true);

    // Create exchange entry
    const exchange = document.createElement('div');
    exchange.className = 'followup-exchange';
    exchange.innerHTML = `<div class="fq">你：${escHtml(question)}</div><div class="fa streaming"></div>`;
    historyEl.appendChild(exchange);
    exchange.scrollIntoView({ behavior: 'smooth', block: 'nearest' });

    const answerEl = exchange.querySelector('.fa');

    try {
      const res = await fetch('/chat', {
        method: 'POST',
        headers: apiHeaders(),
        body: JSON.stringify({ context, follow_up: question }),
      });

      if (!res.ok) {
        const err = await res.json();
        answerEl.classList.remove('streaming');
        answerEl.textContent = '錯誤：' + (err.detail || '未知錯誤');
        return;
      }

      const reader  = res.body.getReader();
      const decoder = new TextDecoder();
      let buf = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buf += decoder.decode(value, { stream: true });
        const lines = buf.split('\n');
        buf = lines.pop();
        for (const line of lines) {
          if (!line.startsWith('data: ')) continue;
          let payload;
          try { payload = JSON.parse(line.slice(6)); } catch { continue; }
          if (payload.error) {
            answerEl.classList.remove('streaming');
            answerEl.textContent = '錯誤：' + payload.error;
            return;
          }
          if (payload.done) { answerEl.classList.remove('streaming'); return; }
          if (payload.text) {
            answerEl.textContent += payload.text;
            exchange.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
          }
        }
      }
      answerEl.classList.remove('streaming');

    } catch (err) {
      answerEl.classList.remove('streaming');
      answerEl.textContent = '連線錯誤，請重試';
    } finally {
      btns.forEach(b => b.disabled = false);
    }
  }
</script>
